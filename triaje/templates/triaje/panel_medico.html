<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel médico</title>
</head>
<body>
    <h1>Panel médico</h1>
    <ul>
        {% for consulta in consultas %}
            <li>
                <strong>{{ consulta.paciente.nombre_completo }}</strong> - {{ consulta.motivo }}
                <br>
                <em>Estado:</em> {{ consulta.estado }}
                <em>Prioridad:</em> {{ consulta.prioridad_ia }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
